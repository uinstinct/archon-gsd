# Archon-GSD drop-in: build the Engine (GSD) runtime INTO Archon's own `app`
# image via Archon's supported Dockerfile.user extension slot.
#
# This is a TEMPLATE shipped by the archon-gsd repo. Deploy it into your Archon
# checkout (the directory holding Archon's docker-compose.yml). See the README,
# "Add archon-gsd to an existing Archon setup". Copy these files to the Archon
# checkout root:
#   docker-compose.override.yml   (this file)
#   Dockerfile.user               (from docker/Dockerfile.user)
#   install-gsd-runtime.sh        (from docker/install-gsd-runtime.sh)
#   gsd-seed-entrypoint.sh        (from docker/gsd-seed-entrypoint.sh)
#   log-tail.ts                   (from docker/log-tail.ts — for the log-tail sidecar below)
#
# Compose auto-merges docker-compose.override.yml with Archon's docker-compose.yml
# (no flags). The base sets `app: { build: ., image: archon }`; this override
# flips the build to Dockerfile.user (FROM archon) so the same `app` image gains
# node>=22 + a container-global GSD install — baked at build, no per-boot cost.
# See docs/adr/0002 (build mechanism) and docs/adr/0001 (why baked + container-global).
#
# Dockerfile.user is `FROM archon`, so the base `archon` image must exist FIRST.
# Two-step (base built without the override, then up with the merge):
#   docker compose -f docker-compose.yml build     # base `archon`
#   docker compose up -d                            # builds Dockerfile.user, runs

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.user
      args:
        # Pin the Engine version; re-confirm against upstream if gsd-core moves.
        GSD_VERSION: 1.5.0-rc.2

  # Log sidecar (issue #4): a separate, read-only observer that streams every
  # Run transcript and Claude Code session log to its own stdout. Watch it with:
  #   docker compose logs -f log-tail
  # It mounts Archon's `archon_data` volume READ-ONLY at /.archon and its
  # `archon_user_home` volume READ-ONLY at /.home, then renders the JSONL
  # transcripts already written by the file-logger and the Claude SDK — one
  # `[runId|node]`-prefixed line per event. It never touches the `app` container,
  # its image, or the DB. Stock `oven/bun` image + the bind-mounted script:
  # no Dockerfile, no build. Adopters copy docker/log-tail.ts to their Archon
  # checkout root as log-tail.ts.
  log-tail:
    image: oven/bun:1.3.11-slim
    command: ["bun", "/log-tail.ts"]
    restart: unless-stopped
    volumes:
      # Same source as the base `app` mount (${ARCHON_DATA:-archon_data}:/.archon),
      # but READ-ONLY — the sidecar is a pure observer.
      - ${ARCHON_DATA:-archon_data}:/.archon:ro
      # Archon's home volume (Claude SDK writes session transcripts to
      # ~/.claude/projects here) — READ-ONLY. Lets the sidecar also render
      # comment-triggered agent runs, which never become Workflow transcripts.
      - ${ARCHON_USER_HOME:-archon_user_home}:/.home:ro
      - ./log-tail.ts:/log-tail.ts:ro
