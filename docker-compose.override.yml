# Archon-GSD drop-in: build the Engine (GSD) runtime INTO Archon's own `app`
# image via Archon's supported Dockerfile.user extension slot.
#
# This is a TEMPLATE shipped by the archon-gsd repo. Deploy it into your Archon
# checkout (the directory holding Archon's docker-compose.yml). See the README,
# "Add archon-gsd to an existing Archon setup". Copy these files to the Archon
# checkout root:
#   docker-compose.override.yml   (this file)
#   Dockerfile.user               (from docker/Dockerfile.user)
#   install-gsd-runtime.sh        (from docker/install-gsd-runtime.sh)
#   gsd-seed-entrypoint.sh        (from docker/gsd-seed-entrypoint.sh)
#   configure-commit-identity.sh  (from docker/configure-commit-identity.sh)
#   log-tail.ts                   (from docker/log-tail.ts — for the log-tail sidecar below)
#
# Compose auto-merges docker-compose.override.yml with Archon's docker-compose.yml
# (no flags). The base sets `app: { build: ., image: archon }`; this override
# flips the build to Dockerfile.user (FROM archon) so the same `app` image gains
# node>=22 + a container-global GSD install — baked at build, no per-boot cost.
# See docs/adr/0002 (build mechanism) and docs/adr/0001 (why baked + container-global).
#
# Dockerfile.user is `FROM archon`, so the base `archon` image must exist FIRST.
# Two-step (base built without the override, then up with the merge):
#   docker compose -f docker-compose.yml build     # base `archon`
#   docker compose up -d                            # builds Dockerfile.user, runs

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.user
      args:
        # Engine version: defaults to latest stable from npm.
        GSD_VERSION: latest
        # Bot commit identity, sourced from .env. Set COMMIT_AUTHOR_NAME alone
        # (e.g. archon-instinct[bot]); the build derives the no-reply email
        # <app-user-id>+<name>@users.noreply.github.com from the GitHub users
        # API. Empty name -> the image keeps the ambient git identity.
        # COMMIT_AUTHOR_EMAIL is an optional override of that derived value.
        COMMIT_AUTHOR_NAME: ${COMMIT_AUTHOR_NAME:-}
        COMMIT_AUTHOR_EMAIL: ${COMMIT_AUTHOR_EMAIL:-}

    # Route every Claude Code -> Anthropic call through the headroom proxy sidecar
    # (below) for token compression. These env vars reach the Claude Code
    # subprocess because Archon's Claude provider passes `env: process.env` through
    # when it spawns the binary. See docs/adr/0003.
    #   * ANTHROPIC_BASE_URL points Claude Code at the proxy instead of the API.
    #   * ENABLE_TOOL_SEARCH=true is MANDATORY with a custom base URL: without it
    #     Claude Code stops deferring tool schemas and materializes every one into
    #     context, breaking sub-agents (acute for sub-agent-heavy gsd-phase).
    #     See GH headroomlabs-ai/headroom #746.
    # To run WITHOUT compression, comment out these two env vars, the depends_on
    # block below, and the `headroom` service further down.
    environment:
      ANTHROPIC_BASE_URL: http://headroom:8787
      ENABLE_TOOL_SEARCH: "true"
    depends_on:
      headroom:
        # Fail closed: don't start app (and never start a run) until the proxy is
        # healthy. A dead proxy under headless GSD would otherwise stall silently.
        condition: service_healthy

    container_name: archon
    networks:
      archon-network:   # inherited from base compose — keep it so app still reaches postgres
      proxy:
    ports: !override
      - "127.0.0.1:${PORT:-3000}:${PORT:-3000}"

  # Headroom proxy sidecar: a transparent context-compression layer between
  # Claude Code and the Anthropic API (60-95% token savings). Replaces the old
  # baked rtk binary. Lean mode — no qdrant/neo4j memory stack. It forwards the
  # incoming request's auth (x-api-key / Bearer) upstream unchanged, so Archon's
  # CLAUDE_CODE_OAUTH_TOKEN / CLAUDE_API_KEY keeps working. Values mirror
  # headroom's own docker-compose.yml. See docs/adr/0003.
  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    entrypoint: ["headroom", "proxy"]
    command: ["--host", "0.0.0.0", "--port", "8787"]
    environment:
      HEADROOM_HOST: 0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8787/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      # Persists savings counters / proxy state across image updates.
      - headroom_workspace:/home/nonroot/.headroom
    networks:
      - archon-network

  # Log sidecar (issue #4): a separate, read-only observer that streams every
  # Run transcript and Claude Code session log to its own stdout. Watch it with:
  #   docker compose logs -f log-tail
  # It mounts Archon's `archon_data` volume READ-ONLY at /.archon and its
  # `archon_user_home` volume READ-ONLY at /.home, then renders the JSONL
  # transcripts already written by the file-logger and the Claude SDK — one
  # `[runId|node]`-prefixed line per event. It never touches the `app` container,
  # its image, or the DB. Stock `oven/bun` image + the bind-mounted script:
  # no Dockerfile, no build. Adopters copy docker/log-tail.ts to their Archon
  # checkout root as log-tail.ts.
  log-tail:
    image: oven/bun:1.3.11-slim
    command: ["bun", "/log-tail.ts"]
    restart: unless-stopped
    volumes:
      # Same source as the base `app` mount (${ARCHON_DATA:-archon_data}:/.archon),
      # but READ-ONLY — the sidecar is a pure observer.
      - ${ARCHON_DATA:-archon_data}:/.archon:ro
      # Archon's home volume (Claude SDK writes session transcripts to
      # ~/.claude/projects here) — READ-ONLY. Lets the sidecar also render
      # comment-triggered agent runs, which never become Workflow transcripts.
      - ${ARCHON_USER_HOME:-archon_user_home}:/.home:ro
      - ./log-tail.ts:/log-tail.ts:ro

volumes:
  headroom_workspace:

networks:
  proxy:
    external: true
    name: proxy
